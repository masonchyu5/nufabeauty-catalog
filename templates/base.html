<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Catalog · Nu Fashion Beauty Supply{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ rel }}assets/styles.css">
</head>
<body>
  <header class="topbar no-print">
    <a class="brand" href="{{ rel }}index.html">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">Nu Fashion Beauty Supply</span>
    </a>
    <nav class="topbar-nav">
      <a href="{{ rel }}index.html" {% if active == 'home' %}aria-current="page"{% endif %}>Index</a>
      <a href="{{ rel }}chemical.html" {% if active == 'chemical' %}aria-current="page"{% endif %}>Chemical</a>
      <button type="button" class="print-button" onclick="window.print()">Print / Save PDF</button>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
